services:
  finance-hub:
    image: 311462405659.dkr.ecr.eu-west-1.amazonaws.com/sirius/sirius-finance-hub:latest
    build:
      dockerfile: docker/finance-hub/Dockerfile
    ports:
      - "8888:8888"
    privileged: false
    user: app-user
    environment:
      PORT: 8888
      SIRIUS_PUBLIC_URL: http://localhost:8080
      SIRIUS_URL: http://json-server:3000
      BACKEND_URL: http://finance-api:8181
      HEALTHCHECK: /finance/health-check
      PREFIX: /finance
      SUPERVISION_BILLING_TEAM_ID: 41
      JWT_SECRET: mysupersecrettestkeythatis128bits
      FINANCE_HUB_LIVE_DATE: 01/01/2024
      SHOW_DIRECT_DEBITS: 1
    depends_on:
      finance-api:
        condition: service_healthy
      json-server:
        condition: service_started

  finance-api:
    image: 311462405659.dkr.ecr.eu-west-1.amazonaws.com/sirius/sirius-finance-api:latest
    build:
      dockerfile: docker/finance-api/Dockerfile
    ports:
      - "8181:8181"
    privileged: false
    user: app-user
    environment:
      PORT: 8181
      HEALTHCHECK: /health-check
      POSTGRES_CONN: sirius-db:5432
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finance
      AWS_REGION: eu-west-1
      AWS_BASE_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: localstack
      AWS_SECRET_ACCESS_KEY: localstack
      EVENT_BUS_NAME: local-main
      S3_ENCRYPTION_KEY: alias/aws/s3
      AWS_S3_ENDPOINT: http://localstack:4566
      SIRIUS_PUBLIC_URL: http://localhost:8181
      FINANCE_ADMIN_PREFIX: /supervision/finance-admin
      JWT_SECRET: mysupersecrettestkeythatis128bits
      FINANCE_HUB_LIVE_DATE: 01/01/2024
      REPORTS_S3_BUCKET: opg-backoffice-reports-local
      ASYNC_S3_BUCKET: opg-backoffice-async-uploads-local
      NOTIFY_URL: http://json-server:3000
      OPG_NOTIFY_API_KEY: test
      OPG_SUPERVISION_SYSTEM_USER_ID: 1
      EVENT_BRIDGE_API_KEY: test
      ALLPAY_HOST: http://allpay-mock:8080
      ALLPAY_API_KEY: test-key
      ALLPAY_ENABLED: 1
      HOLIDAY_API_URL: http://holidays-api-mock:8080/bank-holidays.json
    depends_on:
      allpay-mock:
        condition: service_healthy
      localstack:
        condition: service_healthy
      sirius-db:
        condition: service_healthy

  json-server:
    build:
      dockerfile: json-server/Dockerfile
    ports:
      - '3000:3000'

  cypress:
    build:
      dockerfile: docker/cypress/Dockerfile
    command: [ "--headless", "-b", "electron" ]
    environment:
      CYPRESS_JSON_SERVER_URL: http://json-server:3000
      CYPRESS_FINANCE_API_URL: http://finance-api:8181
      CYPRESS_HOLIDAY_API_URL: http://holidays-api-mock:8080/bank-holidays.json
    volumes:
      - ./cypress/screenshots:/root/cypress/screenshots:rw,delegated
      - ./cypress/logs:/root/cypress/logs:rw,delegated
    depends_on:
      finance-hub:
        condition: service_healthy

  go-lint:
    image: golangci/golangci-lint:v2.12.2@sha256:5cceeef04e53efe1470638d4b4b4f5ceefd574955ab3941b2d9a68a8c9ad5240
    working_dir: /go/src/app
    volumes:
      - ./:/go/src/app
      - ./.cache/golangci-lint/v2.4.0:/root/.cache
    command: golangci-lint run -v --timeout 5m

  gosec:
    image: securego/gosec:2.24.6@sha256:2cf71ea78210c496c65e3a987576a9c8317b68e20f2960520b3f6f8f9f539be5
    working_dir: /app
    volumes:
      - .:/app
    command: -exclude-dir=.gocache -exclude-generated -fmt=sarif -out=/app/test-results/gosec.sarif -stdout -verbose=text /app/...

  yarn:
    image: node:24-alpine3.23@sha256:595398b0081eacda8e1c4c5b97b76cd1020e4d58a8ebcb4843b9bca1e79e7436
    working_dir: /home/node/app
    entrypoint: yarn
    volumes:
      - ./finance-hub:/home/node/app

  sirius-db:
    image: postgres:14-alpine@sha256:f1148c0146b1cd042c566ea15873b479e17bd14589c9eb6bd44a03224a7989c7
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finance
    ports:
      - "5431:5432"
    volumes:
      - ./migrations/1_baseline.sql:/docker-entrypoint-initdb.d/1_baseline.sql
      - ./test-data/seed_data.sql:/seed_data.sql
    healthcheck:
      test: pg_isready --username=user --dbname=finance
      interval: 5s
      timeout: 5s
      retries: 5

  sqlc:
    image: sqlc/sqlc:1.29.0@sha256:0de3f476fb9c11192b4dd5413c531512e9fc5b3ec3cce075b7d7b4709a0c3e58
    environment:
      POSTGRES_CONN: localhost:5432
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finance
      POSTGRES_SEARCH_PATH: supervision_finance
    working_dir: /src
    volumes:
      - ./finance-api/internal/store:/src
      - ./migrations:/schema
    depends_on:
      - finance-migration

  finance-migration:
    image: 311462405659.dkr.ecr.eu-west-1.amazonaws.com/sirius/sirius-finance-migration:latest
    build:
      dockerfile: docker/finance-migration/Dockerfile
    privileged: false
    user: migration-user
    depends_on:
      sirius-db:
        condition: service_healthy
    environment:
      DB_USER: user
      DB_PASSWORD: password
      DB_CONNECTION: sirius-db:5432
      DB_NAME: finance
      DB_SCHEMA: supervision_finance
    command: "up"

  localstack:
    image: localstack/localstack:4.14@sha256:3ebc37595918b8accb852f8048fef2aff047d465167edd655528065b07bc364a
    volumes:
      - "./scripts/localstack/init:/etc/localstack/init/ready.d"
      - "./scripts/localstack/files:/scripts/files"
      - "./scripts/localstack/wait:/scripts/wait"
    ports:
      - "4566:4566"
    environment:
      AWS_DEFAULT_REGION: eu-west-1
    healthcheck:
      test: bash /scripts/wait/healthcheck.sh
      interval: 10s
      timeout: 10s
      retries: 50

  allpay-mock:
    image: 311462405659.dkr.ecr.eu-west-1.amazonaws.com/sirius/sirius-finance-allpay-mock:latest
    build:
      context: .
      dockerfile: docker/allpay/Dockerfile
    healthcheck:
      test: [ "CMD", "imposter", "list", "-x" ]
      interval: 15s
      timeout: 10s
      retries: 3

  holidays-api-mock:
    build:
      context: .
      dockerfile: docker/holidays-api/Dockerfile
    ports:
      - "8080:8080"

  pact-cli:
    image: pactfoundation/pact-cli:1.5.0.4@sha256:4708c3d61157bff90082a483e4ff70541eb66f951eb3e218ea3e80a557abd170
    working_dir: /go/src/app
    volumes:
      - ./pacts:/go/src/app/pacts

  hub-test-runner:
    build:
      context: docker/test-runner/
    command: gotestsum --junitfile test-results/hub-unit-tests.xml -- ./finance-hub/... -coverprofile=test-results/hub-coverage.txt
    working_dir: /go/src/app
    volumes:
      - ./:/go/src/app
      - ./.gocache:/go/pkg/mod
