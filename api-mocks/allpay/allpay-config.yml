plugin: openapi
specFile: openapi.yml

validation:
  request: true

resources:
  - path: "/AllpayApi/Customers/{SchemeCode}/Mandates/Create"
    method: post
    response:
      statusCode: 200
      file: data/success.json
      template: true

  - path: "/AllpayApi/Customers/{SchemeCode}/Mandates/Create"
    method: post
    requestBody:
      jsonPath: $.Customer.LastName
      value: mandate_validation
      operator: contains
    response:
      statusCode: 422
      file: data/validation.json

  - path: "/AllpayApi/Customers/{SchemeCode}/Mandates/Create"
    method: post
    requestBody:
      jsonPath: $.Customer.LastName
      value: mandate_fail
      operator: contains
    response:
      statusCode: 400
      content: "Bad Request - Please check the format of your body request"

  - path: "/AllpayApi/Customers/{SchemeCode}/{ClientRef}/{Surname}/Mandates"
    method: post
    capture:
      clientRef:
        store: schedules
        pathParam: ClientRef
      amount:
        store: schedules
        requestBody:
          jsonPath: $.Schedules[0].Amount
      date:
        store: schedules
        requestBody:
          jsonPath: $.Schedules[0].ScheduleDate
    response:
      statusCode: 200
      file: data/success.json
      template: true

  - path: "/AllpayApi/Customers/{SchemeCode}/{ClientRef}/{Surname}/Mandates"
    method: post
    pathParams:
      # schedule_validation
       Surname: c2NoZWR1bGVfdmFsaWRhdGlvbg==
    response:
      statusCode: 422
      file: data/validation.json

  - path: "/AllpayApi/Customers/{SchemeCode}/{ClientRef}/{Surname}/Mandates"
    method: post
    pathParams:
      # schedule_fail
      Surname: c2NoZWR1bGVfZmFpbA==
    response:
      statusCode: 400
      content: "Bad Request - Please check the format of your body request"

  - path: "/AllpayApi/Customers/{SchemeCode}/{ClientRef}/{Surname}/Mandates/{Date}"
    method: delete
    response:
      statusCode: 200
      file: data/success.json
      template: true

  - path: "/AllpayApi/Customers/{SchemeCode}/{ClientRef}/{Surname}/Mandates/{Date}"
    method: delete
    pathParams:
      # cancel_fail
      Surname: Y2FuY2VsX2ZhaWw=
    response:
      statusCode: 400
      content: "Bad Request - Please check the format of your body request"

  - path: "/AllpayApi/Customers/{SchemeCode}/{ClientRef}/{Surname}/Mandates/Schedule/{Date}/{Amount}"
    method: delete
    response:
      statusCode: 200
      file: data/success.json

  - path: "/AllpayApi/Customers/{SchemeCode}/{ClientRef}/{Surname}/Mandates/Schedule/{Date}/{Amount}"
    method: delete
    pathParams:
      # remove_validation
      Surname: cmVtb3ZlX3ZhbGlkYXRpb24=
    response:
      statusCode: 400
      content: "Bad Request - Please check the format of your body request"

  - path: "/AllpayApi/Customers/{SchemeCode}/Mandates/FailedPayments/{FromDate}/{ToDate}/{Page}"
    method: get
    pathParams:
      ToDate: 2000-01-01
      Page: 1
    response:
      scriptFile: scripts/failed-payments.js
      statusCode: 200

  - path: "/AllpayApi/Customers/{SchemeCode}/Mandates/FailedPayments/{FromDate}/{ToDate}/{Page}"
    method: get
    pathParams:
      ToDate: 2000-01-01
      Page: 2
    response:
      statusCode: 200
      file: data/failed_payments_page_3.json

  - path: "/AllpayApi/Customers/{SchemeCode}/Mandates/FailedPayments/{FromDate}/{ToDate}/{Page}"
    method: get
    pathParams:
      Page: 1
    response:
      statusCode: 200
      file: data/failed_payments_page_1.json

  - path: "/AllpayApi/Customers/{SchemeCode}/Mandates/FailedPayments/{FromDate}/{ToDate}/{Page}"
    method: get
    pathParams:
      Page: 2
    response:
      statusCode: 200
      file: data/failed_payments_page_2.json

  - path: "/AllpayApi/Customers/{SchemeCode}/Mandates/FailedPayments/{FromDate}/{ToDate}/{Page}"
    method: get
    pathParams:
      Page: 3
    response:
      statusCode: 200
      file: data/failed_payments_page_3.json

  - path: "/AllpayApi/BankAccounts/"
    method: get
    response:
      statusCode: 200
      file: data/mod_check_success.json

  - path: "/AllpayApi/BankAccounts/"
    method: get
    queryParams:
      accountnumber: 99999999
    response:
      statusCode: 200
      file: data/mod_check_invalid_combo.json

  - path: "/AllpayApi/BankAccounts/"
    method: get
    queryParams:
      sortcode: 99-99-99
    response:
      statusCode: 200
      file: data/mod_check_invalid_sortcode.json

  - path: "/AllpayApi/BankAccounts/"
    method: get
    queryParams:
      sortcode: 00-00-00
    response:
      statusCode: 200
      file: data/mod_check_nonexistent_sortcode.json

